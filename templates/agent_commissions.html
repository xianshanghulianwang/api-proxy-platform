<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>佣金记录 - 终点</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f7; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; }
  .header h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .header p { font-size: 0.9rem; opacity: 0.9; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  .nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .nav a { padding: 10px 20px; background: white; border-radius: 8px; color: #666; text-decoration: none; font-size: 0.9rem; transition: all 0.2s; }
  .nav a:hover, .nav a.active { background: #667eea; color: white; }
  .section { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .section-title { font-size: 1.1rem; font-weight: 700; color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .stats { display: flex; gap: 20px; margin-bottom: 24px; }
  .stat-box { flex: 1; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; text-align: center; }
  .stat-value { font-size: 1.8rem; font-weight: 700; }
  .stat-label { font-size: 0.85rem; opacity: 0.9; margin-top: 4px; }
  .commissions-table { width: 100%; border-collapse: collapse; }
  .commissions-table th { text-align: left; padding: 14px 12px; background: #f9f9f9; font-size: 0.85rem; color: #666; font-weight: 600; }
  .commissions-table td { padding: 14px 12px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
  .commissions-table tr:hover { background: #f9f9f9; }
  .level-badge { display: inline-block; width: 28px; height: 28px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 50%; text-align: center; line-height: 28px; font-size: 0.8rem; font-weight: 600; }
  .amount { font-weight: 700; color: #10b981; }
  .empty { text-align: center; padding: 60px; color: #999; }
  @media (max-width: 768px) {
    .commissions-table { font-size: 0.85rem; }
    .commissions-table th:nth-child(2), .commissions-table td:nth-child(2) { display: none; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>佣金记录</h1>
  <p>查看您的佣金收入明细</p>
</div>

<div class="container">
  <div class="nav">
    <a href="/agent/dashboard">总览</a>
    <a href="/agent/users">下线管理</a>
    <a href="/agent/commissions" class="active">佣金记录</a>
    <a href="/agent/withdraw">提现</a>
  </div>

  <div class="section">
    <div class="section-title">💰 佣金统计</div>
    <div class="stats" id="stats">
      <div class="stat-box">
        <div class="stat-value" id="totalL1">¥0</div>
        <div class="stat-label">一级佣金</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="totalL2">¥0</div>
        <div class="stat-label">二级佣金</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="totalL3">¥0</div>
        <div class="stat-label">三级佣金</div>
      </div>
    </div>

    <div id="commissionsList">
      <div class="empty">加载中...</div>
    </div>
  </div>
</div>

<script>
async function loadCommissions() {
  try {
    const res = await fetch('/api/agent/commissions');
    const json = await res.json();
    
    if (json.code !== 0) {
      document.getElementById('commissionsList').innerHTML = '<div class="empty">加载失败</div>';
      return;
    }
    
    const data = json.data || [];
    
    if (data.length === 0) {
      document.getElementById('commissionsList').innerHTML = `
        <div class="empty">
          <p style="font-size:3rem;margin-bottom:16px;">💰</p>
          <p>暂无佣金记录</p>
          <p style="font-size:0.9rem;margin-top:8px;">发展下线用户获得佣金</p>
        </div>
      `;
      return;
    }
    
    // 统计各级佣金
    let totalL1 = 0, totalL2 = 0, totalL3 = 0;
    data.forEach(c => {
      if (c.level === 1) totalL1 += c.commission;
      else if (c.level === 2) totalL2 += c.commission;
      else if (c.level === 3) totalL3 += c.commission;
    });
    document.getElementById('totalL1').textContent = '¥' + totalL1.toFixed(2);
    document.getElementById('totalL2').textContent = '¥' + totalL2.toFixed(2);
    document.getElementById('totalL3').textContent = '¥' + totalL3.toFixed(2);
    
    const html = `
      <table class="commissions-table">
        <thead>
          <tr>
            <th>等级</th>
            <th>下线用户</th>
            <th>充值金额</th>
            <th>佣金</th>
            <th>时间</th>
          </tr>
        </thead>
        <tbody>
          ${data.map(c => `
            <tr>
              <td><span class="level-badge">${c.level}</span></td>
              <td>${c.username || c.phone || '用户'}</td>
              <td>¥${c.recharge_amount}</td>
              <td class="amount">+¥${c.commission}</td>
              <td>${new Date(c.created_at).toLocaleString()}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    
    document.getElementById('commissionsList').innerHTML = html;
    
  } catch(e) {
    console.error(e);
    document.getElementById('commissionsList').innerHTML = '<div class="empty">加载失败</div>';
  }
}

loadCommissions();
</script>
</body>
</html>
