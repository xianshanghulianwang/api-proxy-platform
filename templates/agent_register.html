<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>开通代理 - 终点</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 40px 20px; }
  .container { max-width: 1000px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-size: 2rem; color: #667eea; font-weight: 800; letter-spacing: 4px; }
  .header p { color: #999; margin-top: 8px; }
  .benefits { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
  .benefit { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; text-align: center; }
  .benefit-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .benefit h3 { color: #fff; font-size: 1.1rem; margin-bottom: 8px; }
  .benefit p { color: #999; font-size: 0.85rem; line-height: 1.6; }
  .tiers { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .tier { background: white; border-radius: 20px; padding: 32px 24px; text-align: center; transition: all 0.3s; border: 2px solid transparent; }
  .tier:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
  .tier.popular { border-color: #667eea; position: relative; }
  .tier.popular::before { content: '最受欢迎'; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #667eea; color: white; padding: 4px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .tier-name { font-size: 1.2rem; font-weight: 700; color: #333; margin-bottom: 8px; }
  .tier-price { font-size: 2.5rem; font-weight: 800; color: #667eea; }
  .tier-price small { font-size: 1rem; font-weight: 500; color: #999; }
  .tier-quota { font-size: 0.85rem; color: #666; margin: 12px 0; }
  .tier-commission { background: #f5f5f5; border-radius: 8px; padding: 12px; margin: 16px 0; text-align: left; }
  .tier-commission h4 { font-size: 0.85rem; color: #666; margin-bottom: 8px; }
  .tier-commission p { font-size: 0.8rem; color: #333; margin: 4px 0; }
  .tier-btn { display: block; width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 24px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 16px; transition: all 0.3s; }
  .tier-btn:hover { background: #5a6fd6; }
  .tier-btn:disabled { background: #ccc; cursor: not-allowed; }
  .tier-limit { font-size: 0.75rem; color: #ef4444; margin-top: 8px; }
  .features-list { margin-top: 40px; background: white; border-radius: 20px; padding: 32px; }
  .features-list h2 { font-size: 1.5rem; color: #333; margin-bottom: 24px; text-align: center; }
  .feature-item { display: flex; align-items: center; gap: 16px; padding: 16px 0; border-bottom: 1px solid #f0f0f0; }
  .feature-item:last-child { border-bottom: none; }
  .feature-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
  .feature-text h4 { font-size: 1rem; color: #333; margin-bottom: 4px; }
  .feature-text p { font-size: 0.85rem; color: #666; }
  .msg { text-align: center; margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 0.9rem; }
  .msg.error { background: #fef2f2; color: #ef4444; }
  .msg.success { background: #ecfdf5; color: #10b981; }
  @media (max-width: 768px) {
    .tiers { grid-template-columns: 1fr 1fr; }
    .benefits { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>开通代理</h1>
    <p>成为终点平台代理，开启您的API中转站事业</p>
  </div>

  <div class="benefits">
    <div class="benefit">
      <div class="benefit-icon">💰</div>
      <h3>佣金收益</h3>
      <p>下线充值自动获得佣金，支持三级分销</p>
    </div>
    <div class="benefit">
      <div class="benefit-icon">🚀</div>
      <h3>独立API</h3>
      <p>拥有独立的中转API，可自行定价</p>
    </div>
    <div class="benefit">
      <div class="benefit-icon">👥</div>
      <h3>下线管理</h3>
      <p>查看、管理您的所有下线用户</p>
    </div>
  </div>

  <div class="tiers" id="tiersList">
    <!-- 动态加载 -->
  </div>

  <div id="msg" class="msg" style="display:none;"></div>

  <div class="features-list">
    <h2>代理特权</h2>
    <div class="feature-item">
      <div class="feature-icon">✓</div>
      <div class="feature-text">
        <h4>专属推荐链接</h4>
        <p>一键生成您的专属推广链接，发展下线</p>
      </div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">✓</div>
      <div class="feature-text">
        <h4>佣金自动到账</h4>
        <p>下线充值后佣金自动转入可提现余额</p>
      </div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">✓</div>
      <div class="feature-text">
        <h4>自定义加价率</h4>
        <p>自主设置API调用价格，利润最大化</p>
      </div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">✓</div>
      <div class="feature-text">
        <h4>实时数据统计</h4>
        <p>查看佣金明细、下线列表、用量报表</p>
      </div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">✓</div>
      <div class="feature-text">
        <h4>快速提现</h4>
        <p>佣金一键提现到银行卡</p>
      </div>
    </div>
  </div>
</div>

<script>
async function loadTiers() {
  try {
    const res = await fetch('/api/agent/tiers');
    const json = await res.json();
    if (json.code === 0) {
      const list = document.getElementById('tiersList');
      list.innerHTML = json.data.map((tier, i) => `
        <div class="tier ${i === 1 ? 'popular' : ''}">
          <div class="tier-name">${tier.name}</div>
          <div class="tier-price">¥${tier.price}<small>一次性</small></div>
          <div class="tier-quota">${tier.max_agents > 0 ? `限${tier.max_agents}名额` : '不限名额'}</div>
          <div class="tier-commission">
            <h4>佣金比例</h4>
            <p>一级下线: ${(tier.commission_l1 * 100).toFixed(0)}%</p>
            <p>二级下线: ${(tier.commission_l2 * 100).toFixed(0)}%</p>
            <p>三级下线: ${(tier.commission_l3 * 100).toFixed(0)}%</p>
          </div>
          <button class="tier-btn" onclick="applyTier('${tier.id}')">立即开通</button>
          ${tier.current_agents >= tier.max_agents && tier.max_agents > 0 ? '<div class="tier-limit">名额已满</div>' : ''}
        </div>
      `).join('');
    }
  } catch(e) {
    console.error(e);
  }
}

async function applyTier(tierId) {
  if (!confirm('确认开通该代理等级？费用将从余额中扣除。')) return;
  
  try {
    const formData = new FormData();
    formData.append('tier_id', tierId);
    
    const res = await fetch('/api/agent/apply', { method: 'POST', body: formData });
    const json = await res.json();
    
    const msg = document.getElementById('msg');
    if (json.code === 0) {
      msg.textContent = '恭喜！开通成功，正在跳转...';
      msg.className = 'msg success';
      msg.style.display = 'block';
      setTimeout(() => window.location.href = '/agent/dashboard', 1500);
    } else {
      msg.textContent = json.msg || '开通失败';
      msg.className = 'msg error';
      msg.style.display = 'block';
    }
  } catch(e) {
    alert('网络异常');
  }
}

loadTiers();
</script>
</body>
</html>
