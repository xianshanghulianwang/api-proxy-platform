<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 - API智 Hub</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #EEF2FF, #F8FAFC); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .reg-box { background: white; border-radius: 24px; padding: 44px; width: 420px; box-shadow: 0 20px 60px rgba(99,102,241,0.15); }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 { font-size: 1.5rem; color: #4F46E5; font-weight: 800; text-decoration: none; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #374151; }
  .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #E2E8F0; border-radius: 12px; font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
  .form-group input:focus { border-color: #6366F1; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .submit-btn { width: 100%; padding: 13px; background: #6366F1; color: white; border: none; border-radius: 28px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.2s; margin-top: 8px; }
  .submit-btn:hover { background: #4F46E5; }
  .submit-btn:disabled { background: #A5B4FC; cursor: not-allowed; }
  .msg { text-align: center; margin-top: 14px; font-size: 0.88rem; }
  .msg.error { color: #EF4444; }
  .msg.success { color: #10B981; }
  .links { text-align: center; margin-top: 20px; font-size: 0.88rem; color: #64748B; }
  .links a { color: #6366F1; text-decoration: none; font-weight: 600; }
  .tip { background: #F0F9FF; border: 1px solid #BAE6FD; border-radius: 10px; padding: 12px 16px; font-size: 0.82rem; color: #0369A1; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="reg-box">
  <div class="logo">
    <h1>⚡ API智 Hub</h1>
  </div>
  <div class="tip">🎁 注册即送体验额度，5分钟快速接入</div>
  <form id="regForm">
    <div class="form-group">
      <label>用户名 *</label>
      <input type="text" name="username" placeholder="字母、数字、下划线，最少4位" required minlength="4">
    </div>
    <div class="form-group">
      <label>密码 *</label>
      <input type="password" name="password" placeholder="至少6位" required minlength="6">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>邮箱（选填）</label>
        <input type="email" name="email" placeholder="example@mail.com">
      </div>
      <div class="form-group">
        <label>手机（选填）</label>
        <input type="tel" name="phone" placeholder="13800138000">
      </div>
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">注册并登录</button>
    <div id="msg" class="msg"></div>
  </form>
  <div class="links">
    已有账号？<a href="/login">立即登录</a>
  </div>
</div>
<script>
document.getElementById('regForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');
  const data = new FormData(this);
  btn.disabled = true;
  btn.textContent = '注册中...';
  msg.textContent = '';
  msg.className = 'msg';

  try {
    const res = await fetch('/api/auth/register', { method: 'POST', body: data });
    const json = await res.json();
    if (json.code === 0) {
      msg.textContent = '注册成功，正在跳转...';
      msg.className = 'msg success';
      setTimeout(() => window.location.href = '/dashboard', 800);
    } else {
      msg.textContent = json.msg || '注册失败';
      msg.className = 'msg error';
      btn.disabled = false;
      btn.textContent = '注册并登录';
    }
  } catch(err) {
    msg.textContent = '网络异常，请重试';
    msg.className = 'msg error';
    btn.disabled = false;
    btn.textContent = '注册并登录';
  }
});
</script>
</body>
</html>
