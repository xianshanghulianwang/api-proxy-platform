<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代理中心 - 终点</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f7; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; }
  .header h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .header p { font-size: 0.9rem; opacity: 0.9; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 20px; background: white; margin: -20px 20px 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .stat { text-align: center; padding: 16px; }
  .stat-value { font-size: 1.8rem; font-weight: 700; color: #667eea; }
  .stat-label { font-size: 0.8rem; color: #999; margin-top: 4px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  .section { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .section-title { font-size: 1.1rem; font-weight: 700; color: #333; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #f0f0f0; display: flex; align-items: center; gap: 8px; }
  .share-box { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 16px; padding: 24px; color: white; text-align: center; }
  .share-title { font-size: 1.2rem; margin-bottom: 8px; }
  .share-desc { font-size: 0.9rem; opacity: 0.9; margin-bottom: 20px; }
  .share-link { display: flex; gap: 12px; align-items: center; background: rgba(255,255,255,0.2); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; }
  .share-link input { flex: 1; background: none; border: none; color: white; font-size: 0.95rem; outline: none; }
  .share-link input::placeholder { color: rgba(255,255,255,0.7); }
  .share-btn { background: white; color: #667eea; padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .share-btn:hover { background: #f0f0f0; }
  .share-qr { width: 150px; height: 150px; background: white; border-radius: 12px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
  .share-qr img { max-width: 130px; max-height: 130px; }
  .nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .nav a { padding: 10px 20px; background: #f5f5f5; border-radius: 8px; color: #666; text-decoration: none; font-size: 0.9rem; transition: all 0.2s; }
  .nav a:hover, .nav a.active { background: #667eea; color: white; }
  .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .info-item { background: #f9f9f9; padding: 16px; border-radius: 12px; }
  .info-label { font-size: 0.8rem; color: #999; margin-bottom: 4px; }
  .info-value { font-size: 1rem; font-weight: 600; color: #333; word-break: break-all; }
  .commission-table { width: 100%; border-collapse: collapse; }
  .commission-table th { text-align: left; padding: 12px; background: #f9f9f9; font-size: 0.85rem; color: #666; font-weight: 600; }
  .commission-table td { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
  .commission-table tr:hover { background: #f9f9f9; }
  .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .badge-pending { background: #fef3c7; color: #d97706; }
  .badge-approved { background: #d1fae5; color: #059669; }
  .badge-rejected { background: #fee2e2; color: #dc2626; }
  .empty { text-align: center; padding: 40px; color: #999; }
  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); margin: -20px 12px 12px; }
    .info-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>代理中心</h1>
  <p>管理您的API中转站</p>
</div>

<div class="stats" id="stats">
  <div class="stat">
    <div class="stat-value" id="totalCommission">¥0</div>
    <div class="stat-label">累计佣金</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="withdrawable">¥0</div>
    <div class="stat-label">可提现</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="totalDownlines">0</div>
    <div class="stat-label">下线用户</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="tierName">-</div>
    <div class="stat-label">代理等级</div>
  </div>
</div>

<div class="container">
  <div class="section">
    <div class="section-title">🔗 推广链接</div>
    <div class="share-box">
      <div class="share-title">一键分享 轻松赚钱</div>
      <div class="share-desc">复制链接发送给好友，好友注册充值即得佣金</div>
      <div class="share-link">
        <input type="text" id="shareLink" readonly placeholder="加载中...">
        <button class="share-btn" onclick="copyLink()">复制链接</button>
      </div>
      <div class="share-qr" id="qrcode">
        <span style="color:#666;">加载中...</span>
      </div>
    </div>
  </div>

  <div class="nav">
    <a href="/agent/dashboard" class="active">总览</a>
    <a href="/agent/users">下线管理</a>
    <a href="/agent/commissions">佣金记录</a>
    <a href="/agent/withdraw">提现</a>
  </div>

  <div class="section">
    <div class="section-title">📊 代理信息</div>
    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">推荐码</div>
        <div class="info-value" id="referralCode">-</div>
      </div>
      <div class="info-item">
        <div class="info-label">代理等级</div>
        <div class="info-value" id="tierName2">-</div>
      </div>
      <div class="info-item">
        <div class="info-label">一级佣金比例</div>
        <div class="info-value" id="commissionL1">-</div>
      </div>
      <div class="info-item">
        <div class="info-label">二级佣金比例</div>
        <div class="info-value" id="commissionL2">-</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">💰 最新佣金</div>
    <div id="recentCommissions">
      <div class="empty">加载中...</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
const domain = window.location.host;

async function loadData() {
  try {
    const res = await fetch('/api/user/info');
    const json = await res.json();
    if (json.code !== 0) {
      window.location.href = '/login';
      return;
    }
    
    const user = json.data;
    if (!user.is_agent) {
      window.location.href = '/agent/register';
      return;
    }
    
    // 显示推广链接
    const shareLink = `${window.location.protocol}//${domain}/register?code=${user.referral_code}`;
    document.getElementById('shareLink').value = shareLink;
    
    // 生成二维码
    document.getElementById('qrcode').innerHTML = '';
    new QRCode(document.getElementById('qrcode'), {
      text: shareLink,
      width: 130,
      height: 130
    });
    
    // 加载代理数据
    const agentRes = await fetch('/api/agent/commissions');
    const agentJson = await agentRes.json();
    
    const stats = json.data;
    document.getElementById('totalCommission').textContent = '¥' + (stats.total_commission || 0).toFixed(2);
    document.getElementById('withdrawable').textContent = '¥' + (stats.withdrawable_balance || 0).toFixed(2);
    document.getElementById('referralCode').textContent = stats.referral_code || '-';
    
    // 加载佣金记录
    if (agentJson.code === 0 && agentJson.data.length > 0) {
      const html = `
        <table class="commission-table">
          <thead>
            <tr>
              <th>用户</th>
              <th>充值金额</th>
              <th>佣金</th>
              <th>等级</th>
              <th>时间</th>
            </tr>
          </thead>
          <tbody>
            ${agentJson.data.slice(0, 10).map(c => `
              <tr>
                <td>${c.username || c.phone || '用户'}</td>
                <td>¥${c.recharge_amount}</td>
                <td style="color:#10b981;font-weight:600;">+¥${c.commission}</td>
                <td><span class="badge badge-${c.status}">${c.level}级</span></td>
                <td>${new Date(c.created_at).toLocaleDateString()}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      document.getElementById('recentCommissions').innerHTML = html;
    } else {
      document.getElementById('recentCommissions').innerHTML = '<div class="empty">暂无佣金记录</div>';
    }
    
  } catch(e) {
    console.error(e);
  }
}

function copyLink() {
  const input = document.getElementById('shareLink');
  input.select();
  document.execCommand('copy');
  alert('链接已复制！');
}

loadData();
</script>
</body>
</html>
