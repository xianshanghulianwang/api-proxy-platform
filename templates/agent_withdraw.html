<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提现 - 终点</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f7; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; }
  .header h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .header p { font-size: 0.9rem; opacity: 0.9; }
  .container { max-width: 800px; margin: 0 auto; padding: 20px; }
  .nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .nav a { padding: 10px 20px; background: white; border-radius: 8px; color: #666; text-decoration: none; font-size: 0.9rem; transition: all 0.2s; }
  .nav a:hover, .nav a.active { background: #667eea; color: white; }
  .section { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .section-title { font-size: 1.1rem; font-weight: 700; color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .balance-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 16px; padding: 30px; color: white; text-align: center; margin-bottom: 24px; }
  .balance-label { font-size: 0.9rem; opacity: 0.9; margin-bottom: 8px; }
  .balance-value { font-size: 3rem; font-weight: 700; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 0.9rem; font-weight: 600; color: #333; margin-bottom: 8px; }
  .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; font-family: inherit; outline: none; transition: border-color 0.3s; }
  .form-group input:focus { border-color: #667eea; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 28px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .msg { text-align: center; margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 0.9rem; display: none; }
  .msg.error { background: #fef2f2; color: #ef4444; }
  .msg.success { background: #d1fae5; color: #059669; }
  .history-table { width: 100%; border-collapse: collapse; margin-top: 24px; }
  .history-table th { text-align: left; padding: 12px; background: #f9f9f9; font-size: 0.85rem; color: #666; font-weight: 600; }
  .history-table td { padding: 14px 12px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
  .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
  .badge-pending { background: #fef3c7; color: #d97706; }
  .badge-approved { background: #d1fae5; color: #059669; }
  .badge-rejected { background: #fee2e2; color: #dc2626; }
  .tip { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 12px; padding: 16px; font-size: 0.85rem; color: #0369a1; margin-bottom: 20px; line-height: 1.6; }
  @media (max-width: 768px) {
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>佣金提现</h1>
  <p>将可提现余额转入银行卡</p>
</div>

<div class="container">
  <div class="nav">
    <a href="/agent/dashboard">总览</a>
    <a href="/agent/users">下线管理</a>
    <a href="/agent/commissions">佣金记录</a>
    <a href="/agent/withdraw" class="active">提现</a>
  </div>

  <div class="section">
    <div class="balance-card">
      <div class="balance-label">可提现余额</div>
      <div class="balance-value" id="withdrawableBalance">¥0</div>
    </div>

    <div class="tip">
      💡 提现说明：<br>
      • 最低提现金额：100元<br>
      • 提现手续费：1%<br>
      • 提现将在1-3个工作日内到账
    </div>

    <form id="withdrawForm">
      <div class="form-group">
        <label>提现金额</label>
        <input type="number" name="amount" id="amount" placeholder="请输入提现金额" min="100" step="0.01" required>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>开户银行</label>
          <input type="text" name="bank_name" placeholder="如：工商银行" required>
        </div>
        <div class="form-group">
          <label>银行卡号</label>
          <input type="text" name="bank_account" placeholder="请输入银行卡号" required>
        </div>
      </div>
      
      <div class="form-group">
        <label>开户姓名</label>
        <input type="text" name="bank_holder" placeholder="请输入开户姓名" required>
      </div>
      
      <button type="submit" class="submit-btn" id="submitBtn">申请提现</button>
      <div id="msg" class="msg"></div>
    </form>

    <div id="history">
      <!-- 提现记录将动态加载 -->
    </div>
  </div>
</div>

<script>
async function loadData() {
  try {
    const res = await fetch('/api/user/info');
    const json = await res.json();
    if (json.code === 0) {
      document.getElementById('withdrawableBalance').textContent = '¥' + (json.data.withdrawable_balance || 0).toFixed(2);
    }
    
    const withdrawRes = await fetch('/api/agent/withdrawals');
    const withdrawJson = await withdrawRes.json();
    
    if (withdrawJson.code === 0 && withdrawJson.data.length > 0) {
      document.getElementById('history').innerHTML = `
        <h3 style="font-size:1rem;margin-bottom:12px;">提现记录</h3>
        <table class="history-table">
          <thead>
            <tr>
              <th>金额</th>
              <th>银行</th>
              <th>状态</th>
              <th>时间</th>
            </tr>
          </thead>
          <tbody>
            ${withdrawJson.data.map(w => `
              <tr>
                <td style="font-weight:600;">¥${w.amount}</td>
                <td>${w.bank_name}</td>
                <td><span class="badge badge-${w.status}">${w.status === 'pending' ? '处理中' : w.status === 'approved' ? '已打款' : '已拒绝'}</span></td>
                <td>${new Date(w.created_at).toLocaleDateString()}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }
  } catch(e) {
    console.error(e);
  }
}

document.getElementById('withdrawForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');
  const formData = new FormData(this);
  
  const data = {
    amount: parseFloat(formData.get('amount')),
    bank_name: formData.get('bank_name'),
    bank_account: formData.get('bank_account'),
    bank_holder: formData.get('bank_holder')
  };
  
  if (data.amount < 100) {
    msg.textContent = '最低提现100元';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }
  
  btn.disabled = true;
  btn.textContent = '提交中...';
  
  try {
    const res = await fetch('/api/agent/withdraw', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    const json = await res.json();
    
    if (json.code === 0) {
      msg.textContent = '提现申请已提交！';
      msg.className = 'msg success';
      msg.style.display = 'block';
      this.reset();
      setTimeout(() => location.reload(), 1500);
    } else {
      msg.textContent = json.msg || '提交失败';
      msg.className = 'msg error';
      msg.style.display = 'block';
    }
  } catch(e) {
    msg.textContent = '网络异常';
    msg.className = 'msg error';
    msg.style.display = 'block';
  }
  
  btn.disabled = false;
  btn.textContent = '申请提现';
});

loadData();
</script>
</body>
</html>
