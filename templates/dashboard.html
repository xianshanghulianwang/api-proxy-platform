<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>控制台 - 终点网站</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f7; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; }
  .header h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .header p { font-size: 0.9rem; opacity: 0.9; }
  .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .stat { background: white; border-radius: 16px; padding: 24px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .stat-value { font-size: 1.8rem; font-weight: 700; color: #667eea; }
  .stat-label { font-size: 0.85rem; color: #999; margin-top: 4px; }
  .section { background: white; border-radius: 16px; padding: 24px; margin-top: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .section-title { font-size: 1.1rem; font-weight: 700; color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .api-key-box { background: #f8fafc; border: 2px dashed #e2e8f0; border-radius: 12px; padding: 20px; display: flex; align-items: center; justify-content: space-between; }
  .api-key-box input { flex: 1; border: none; background: none; font-family: monospace; font-size: 0.9rem; color: #333; outline: none; }
  .copy-btn { background: #667eea; color: white; padding: 8px 16px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
  .copy-btn:hover { background: #5a6fd6; }
  .quick-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 20px; }
  .action-btn { display: flex; align-items: center; gap: 12px; padding: 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; text-decoration: none; color: #333; font-weight: 500; transition: all 0.2s; }
  .action-btn:hover { border-color: #667eea; color: #667eea; }
  .action-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
  .upgrade-banner { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; padding: 24px; color: white; display: flex; align-items: center; justify-content: space-between; margin-top: 20px; }
  .upgrade-banner h3 { font-size: 1.1rem; margin-bottom: 4px; }
  .upgrade-banner p { font-size: 0.9rem; opacity: 0.9; }
  .upgrade-btn { background: white; color: #667eea; padding: 12px 24px; border: none; border-radius: 24px; font-weight: 700; cursor: pointer; text-decoration: none; }
  .upgrade-btn:hover { background: #f0f9ff; }
  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .quick-actions { grid-template-columns: 1fr; }
    .upgrade-banner { flex-direction: column; gap: 16px; text-align: center; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>控制台</h1>
  <p id="welcome">欢迎回来</p>
</div>

<div class="container">
  <div class="stats" id="stats">
    <div class="stat">
      <div class="stat-value" id="balance">¥0</div>
      <div class="stat-label">账户余额</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="quota">0</div>
      <div class="stat-label">API额度</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="apiCalls">0</div>
      <div class="stat-label">累计调用</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="userType">游客</div>
      <div class="stat-label">用户类型</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">🔑 您的 API Key</div>
    <div class="api-key-box">
      <input type="text" id="apiKey" readonly placeholder="登录后查看">
      <button class="copy-btn" onclick="copyKey()">复制</button>
    </div>
  </div>

  <div class="upgrade-banner" id="upgradeBanner" style="display:none;">
    <div>
      <h3>🚀 开通代理 开启创业之路</h3>
      <p>成为代理拥有独立中转站，发展下线获得佣金</p>
    </div>
    <a href="/agent/register" class="upgrade-btn">立即开通</a>
  </div>

  <div class="section">
    <div class="section-title">⚡ 快捷操作</div>
    <div class="quick-actions">
      <a href="/pricing" class="action-btn">
        <div class="action-icon">💰</div>
        <span>购买套餐</span>
      </a>
      <a href="/docs" class="action-btn">
        <div class="action-icon">📚</div>
        <span>API文档</span>
      </a>
      <a href="/agent/register" class="action-btn" id="agentLink">
        <div class="action-icon">👑</div>
        <span>开通代理</span>
      </a>
    </div>
  </div>
</div>

<script>
async function loadUserInfo() {
  try {
    const res = await fetch('/api/user/info');
    const json = await res.json();
    
    if (json.code !== 0) {
      window.location.href = '/login';
      return;
    }
    
    const data = json.data;
    document.getElementById('welcome').textContent = `欢迎回来，${data.username}`;
    document.getElementById('balance').textContent = '¥' + (data.balance || 0).toFixed(2);
    document.getElementById('quota').textContent = data.api_quota || 0;
    document.getElementById('apiKey').value = data.api_key || '';
    document.getElementById('userType').textContent = data.is_agent ? '代理商' : '普通用户';
    
    if (data.is_agent) {
      document.getElementById('upgradeBanner').style.display = 'none';
      document.getElementById('agentLink').href = '/agent/dashboard';
      document.getElementById('agentLink').querySelector('span').textContent = '代理中心';
    }
  } catch(e) {
    console.error(e);
  }
}

function copyKey() {
  const key = document.getElementById('apiKey').value;
  if (!key) return;
  navigator.clipboard.writeText(key).then(() => {
    alert('API Key 已复制！');
  });
}

loadUserInfo();
</script>
</body>
</html>
